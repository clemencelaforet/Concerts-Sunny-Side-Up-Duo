<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concerts – Sunny Side Up Duo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ssu-sun:      #E8920A;
    --ssu-sun-lt:   #FAC765;
    --ssu-sky:      #3EA8C8;
    --ssu-sky-lt:   #B8E0EF;
    --ssu-wine:     #7A1E2E;
    --ssu-wine-lt:  #C05068;
    --ssu-green:    #3A7D44;
    --ssu-purple:   #7F77DD;
    --ssu-gray:     #888780;
    --ssu-bg:       #F7F5F0;
    --ssu-white:    #FFFFFF;
    --ssu-text:     #1A1A18;
    --ssu-muted:    #666560;
    --ssu-border:   #E2DED4;
  }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--ssu-bg);
    color: var(--ssu-text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--ssu-wine);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-logo {
    width: 36px;
    height: 36px;
    object-fit: contain;
    flex-shrink: 0;
    display: block;
  }
  header h1 {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.02em;
  }
  header h1 span { color: var(--ssu-sun-lt); }

  /* ── Filters ── */
  #filters {
    background: var(--ssu-white);
    border-bottom: 1px solid var(--ssu-border);
    padding: 10px 14px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .fg {
    display: flex;
    flex-direction: column;
    gap: 3px;
    position: relative;
  }
  .fg label {
    font-size: 10px;
    color: var(--ssu-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .fg input, .fg select {
    font-size: 12px;
    padding: 4px 7px;
    border: 1px solid var(--ssu-border);
    border-radius: 6px;
    background: var(--ssu-bg);
    color: var(--ssu-text);
    height: 30px;
  }
  .fg select { min-width: 110px; }

  /* ── Multi-select dropdown ── */
  .multi-select-wrap {
    position: relative;
    min-width: 130px;
  }
  .multi-select-btn {
    font-size: 12px;
    padding: 4px 22px 4px 7px;
    border: 1px solid var(--ssu-border);
    border-radius: 6px;
    background: var(--ssu-bg);
    color: var(--ssu-text);
    height: 30px;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
    text-align: left;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 4px;
    user-select: none;
  }
  .multi-select-btn::after {
    content: "▾";
    font-size: 10px;
    color: var(--ssu-muted);
    flex-shrink: 0;
  }
  .multi-select-btn.has-selection {
    border-color: var(--ssu-sun);
    background: #FEF6E8;
    color: var(--ssu-sun);
    font-weight: 600;
  }
  .multi-select-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    background: var(--ssu-white);
    border: 1px solid var(--ssu-border);
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    z-index: 1000;
    min-width: 160px;
    overflow: hidden;
    display: none;
    flex-direction: column;
  }
  .multi-select-dropdown.open { display: flex; }
  .multi-select-option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    cursor: pointer;
    font-size: 12px;
    color: var(--ssu-text);
    transition: background 0.1s;
    white-space: nowrap;
  }
  .multi-select-option:hover { background: var(--ssu-bg); }
  .multi-select-option input[type="checkbox"] {
    accent-color: var(--ssu-sun);
    width: 13px; height: 13px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .multi-select-divider {
    border: none;
    border-top: 1px solid var(--ssu-border);
    margin: 2px 0;
  }
  .multi-select-clear {
    font-size: 11px;
    color: var(--ssu-muted);
    padding: 5px 12px;
    cursor: pointer;
    text-align: center;
    transition: color 0.1s;
  }
  .multi-select-clear:hover { color: var(--ssu-wine); }

  #btn-passes {
    font-size: 11px;
    padding: 4px 10px;
    height: 30px;
    border: 1px solid var(--ssu-border);
    border-radius: 6px;
    background: var(--ssu-bg);
    cursor: pointer;
    color: var(--ssu-muted);
    white-space: nowrap;
    font-weight: 500;
  }
  #btn-passes.actif {
    background: var(--ssu-wine);
    color: #fff;
    border-color: var(--ssu-wine);
  }
  #compteur {
    font-size: 11px;
    color: var(--ssu-muted);
    align-self: center;
    white-space: nowrap;
    margin-left: auto;
    font-weight: 500;
  }

  /* ── Map ── */
  #map { flex: 1; }

  /* ── Popup ── */
  .popup-inner { min-width: 200px; max-width: 270px; font-size: 13px; line-height: 1.5; }
  .p-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .p-nom { font-weight: 600; font-size: 14px; }
  .p-dates { font-size: 12px; color: #666; margin-top: 1px; }
  .p-type-badge {
    display: inline-block; font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 99px; margin-bottom: 7px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .p-adresse { font-size: 12px; color: #555; margin-bottom: 7px; }
  .p-liens a {
    display: inline-block; margin-right: 5px; margin-bottom: 4px;
    font-size: 11px; font-weight: 500;
    color: var(--ssu-sky); text-decoration: none;
    border: 1px solid var(--ssu-sky-lt);
    border-radius: 4px; padding: 2px 7px;
  }
  .p-liens a:hover { background: #EAF5FB; }
  .popup-passe .p-nom { color: #999; }

  /* ── Loader ── */
  #loader {
    position: absolute; inset: 0;
    background: rgba(247,245,240,0.88);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999; gap: 10px;
  }
  #loader.hidden { display: none; }
  .loader-sun {
    width: 40px; height: 40px;
    background: var(--ssu-sun);
    border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.15); opacity: 0.7; }
  }
  #loader p { font-size: 13px; color: var(--ssu-muted); }

  /* ── Leaflet popup override ── */
  .leaflet-popup-content-wrapper { border-radius: 10px !important; box-shadow: 0 4px 16px rgba(0,0,0,0.12) !important; }
  .leaflet-popup-content { margin: 12px 14px !important; }
</style>
</head>
<body>

<header>
  <img 
    src="https://raw.githubusercontent.com/clemencelaforet/Concerts-Sunny-Side-Up-Duo/main/SSU_Logo.png"
    alt="Sunny Side Up Duo"
    class="header-logo"
  >

  <h1><span>Sunny Side Up Duo</span> — Concerts</h1>
</header>

<div id="filters">
  <div class="fg">
    <label>Du</label>
    <input type="date" id="f-debut">
  </div>
  <div class="fg">
    <label>Au</label>
    <input type="date" id="f-fin">
  </div>
  <div class="fg">
    <label>Pays</label>
    <select id="f-pays"><option value="">Tous</option></select>
  </div>
  <div class="fg">
    <label>Région</label>
    <select id="f-region"><option value="">Toutes</option></select>
  </div>
  <div class="fg">
    <label>Département</label>
    <select id="f-dept"><option value="">Tous</option></select>
  </div>
  <div class="fg">
    <label>Type</label>
    <div class="multi-select-wrap" id="type-multi-wrap">
      <div class="multi-select-btn" id="type-multi-btn">
        <span id="type-multi-label">Tous</span>
      </div>
      <div class="multi-select-dropdown" id="type-multi-dropdown"></div>
    </div>
  </div>
  <button id="btn-passes">Afficher les concerts passés</button>
  <span id="compteur"></span>
</div>

<div id="map"></div>
<div id="loader">
  <div class="loader-sun"></div>
  <p>Chargement des concerts…</p>
</div>

<script>
const CONFIG = {
  SHEET_ID:   "1vP6q02BlHg2-sZ6VwElpf3Z76ADrK0FrY_avO5paQiw",
  SHEET_NAME: "Concerts",

  TYPES: {
    "Festival":   { color: "#E8920A", bg: "#FAC765", emoji: "🎪" },
    "Concert":    { color: "#3EA8C8", bg: "#B8E0EF", emoji: "🎵" },
    "Résidence":  { color: "#3A7D44", bg: "#9FE1A0", emoji: "🏠" },
    "Showcase":   { color: "#7F77DD", bg: "#CECCF6", emoji: "🎤" },
    "Bal":        { color: "#D4537E", bg: "#F4C0D1", emoji: "💃" },
    "default":    { color: "#888780", bg: "#D3D1C7", emoji: "📍" }
  }
};

// Couleur unique pour tous les pictos
const MARKER_COLOR        = "#E8920A";
const MARKER_COLOR_PASSE  = "#aaa";

const map = L.map("map").setView([46.5, 2.5], 6);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
  maxZoom: 18
}).addTo(map);

let tousLesConcerts = [];
let afficherPasses  = false;
let typesActifs     = new Set();
let markersLayer    = L.layerGroup().addTo(map);

// ── Multi-select Type ──
const typeBtn      = document.getElementById("type-multi-btn");
const typeDropdown = document.getElementById("type-multi-dropdown");
const typeLabel    = document.getElementById("type-multi-label");

typeBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  typeDropdown.classList.toggle("open");
});
document.addEventListener("click", (e) => {
  if (!document.getElementById("type-multi-wrap").contains(e.target)) {
    typeDropdown.classList.remove("open");
  }
});

function buildTypeDropdown() {
  const types = [...new Set(tousLesConcerts.map(c => c.type).filter(Boolean))]
    .sort((a, b) => a.localeCompare(b, "fr", { sensitivity: "base" }));
  typeDropdown.innerHTML = "";

  types.forEach(type => {
    const item = document.createElement("label");
    item.className = "multi-select-option";
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.value = type;
    cb.checked = typesActifs.has(type);
    cb.addEventListener("change", () => {
      if (cb.checked) typesActifs.add(type);
      else typesActifs.delete(type);
      updateTypeBtnLabel();
      appliquerFiltres();
    });
    item.appendChild(cb);
    item.appendChild(document.createTextNode(type));
    typeDropdown.appendChild(item);
  });

  // Separateur + reset
  const hr = document.createElement("hr");
  hr.className = "multi-select-divider";
  typeDropdown.appendChild(hr);

  const clear = document.createElement("div");
  clear.className = "multi-select-clear";
  clear.textContent = "Tout effacer";
  clear.addEventListener("click", () => {
    typesActifs.clear();
    typeDropdown.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
    updateTypeBtnLabel();
    appliquerFiltres();
  });
  typeDropdown.appendChild(clear);
}

function updateTypeBtnLabel() {
  if (typesActifs.size === 0) {
    typeLabel.textContent = "Tous";
    typeBtn.classList.remove("has-selection");
  } else if (typesActifs.size === 1) {
    typeLabel.textContent = [...typesActifs][0];
    typeBtn.classList.add("has-selection");
  } else {
    typeLabel.textContent = `${typesActifs.size} types`;
    typeBtn.classList.add("has-selection");
  }
}

// ── Tri alphabétique avec accents ──
function sortAlpha(arr) {
  return [...arr].sort((a, b) => a.localeCompare(b, "fr", { sensitivity: "base" }));
}

// ── Chargement ──
async function chargerDonnees() {
  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(CONFIG.SHEET_NAME)}`;
  try {
    const res  = await fetch(url);
    const text = await res.text();
    tousLesConcerts = parseCSV(text);
    buildTypeDropdown();
    remplirFiltres();
    appliquerFiltres();
    document.getElementById("loader").classList.add("hidden");
  } catch(e) {
    document.getElementById("loader").innerHTML = '<p style="color:#c00;padding:20px;text-align:center">Erreur de chargement. Vérifie l\'ID du Sheets et le partage en lecture.</p>';
    console.error(e);
  }
}

// ── CSV ──
// Colonnes : 0=dateDebut, 1=dateFin, 2=nom, 3=ville, 4=adresse,
//            5=dept_numero, 6=dept, 7=region, 8=pays,
//            9=lat, 10=lng, 11=type, 12=liens
function parseCSV(text) {
  const lines  = text.trim().split("\n");
  const result = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = splitCSV(lines[i]);
    const g = (n) => cols[n]?.trim().replace(/^"|"$/g, "") || "";
    const nom    = g(2);
    const latRaw = g(9);
    const lngRaw = g(10);
    const lat    = parseFloat(latRaw.replace(",","."));
    const lng    = parseFloat(lngRaw.replace(",","."));
    if (!nom || isNaN(lat) || isNaN(lng)) continue;
    result.push({
      dateDebut: g(0), dateFin: g(1), nom,
      ville: g(3), adresse: g(4),
      dept_numero: g(5), dept: g(6),
      region: g(7), pays: g(8),
      lat, lng,
      type: g(11), liens: g(12)
    });
  }
  return result;
}

function splitCSV(line) {
  const r = []; let cur = ""; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    if (line[i] === '"') { inQ = !inQ; }
    else if (line[i] === "," && !inQ) { r.push(cur); cur = ""; }
    else cur += line[i];
  }
  r.push(cur);
  return r;
}

// ── Filtres sélects ──
function remplirFiltres() {
  const uniq = arr => sortAlpha([...new Set(arr.filter(Boolean))]);
  remplirSelect("f-pays",   uniq(tousLesConcerts.map(c => c.pays)));
  remplirSelect("f-region", uniq(tousLesConcerts.map(c => c.region)));
}

function remplirSelect(id, vals) {
  const sel = document.getElementById(id);
  const cur = sel.value;
  while (sel.options.length > 1) sel.remove(1);
  vals.forEach(v => { const o = document.createElement("option"); o.value = o.textContent = v; sel.appendChild(o); });
  if (cur) sel.value = cur;
}

function majDepts() {
  const reg   = document.getElementById("f-region").value;
  const depts = sortAlpha([...new Set(
    tousLesConcerts.filter(c => !reg || c.region === reg).map(c => c.dept).filter(Boolean)
  )]);
  remplirSelect("f-dept", depts);
}

// ── Filtres ──
function appliquerFiltres() {
  const fDebut  = document.getElementById("f-debut").value;
  const fFin    = document.getElementById("f-fin").value;
  const fPays   = document.getElementById("f-pays").value;
  const fRegion = document.getElementById("f-region").value;
  const fDept   = document.getElementById("f-dept").value;
  const auj     = new Date(); auj.setHours(0,0,0,0);

  const filtres = tousLesConcerts.filter(c => {
    const dD = parseDate(c.dateDebut);
    const dF = parseDate(c.dateFin) || dD;
    if (!afficherPasses && dF < auj) return false;
    if (fDebut && dD < new Date(fDebut)) return false;
    if (fFin   && dD > new Date(fFin))   return false;
    if (fPays   && c.pays   !== fPays)   return false;
    if (fRegion && c.region !== fRegion) return false;
    if (fDept   && c.dept   !== fDept)   return false;
    if (typesActifs.size > 0 && !typesActifs.has(c.type)) return false;
    return true;
  });

  afficherMarqueurs(filtres);
  const n = filtres.length;
  document.getElementById("compteur").textContent = `${n} concert${n > 1 ? "s" : ""}`;
}

// ── Marqueurs ──
// Picto unique : goutte orangée, sans icône ni emoji
function makeMarkerSvg(passe) {
  const fill   = passe ? MARKER_COLOR_PASSE : MARKER_COLOR;
  const filter = passe ? 'filter:opacity(0.45)' : '';
  return `<div style="position:relative;width:28px;height:32px;">
    <svg viewBox="0 0 28 32" xmlns="http://www.w3.org/2000/svg" style="width:28px;height:32px;${filter}">
      <path d="M14 0C6.27 0 0 6.27 0 14c0 9.33 14 18 14 18S28 23.33 28 14C28 6.27 21.73 0 14 0z"
        fill="${fill}" stroke="#fff" stroke-width="1.5"/>
      <circle cx="14" cy="13" r="4" fill="rgba(255,255,255,0.35)"/>
    </svg>
  </div>`;
}

function afficherMarqueurs(concerts) {
  markersLayer.clearLayers();
  concerts.forEach(c => {
    const auj   = new Date(); auj.setHours(0,0,0,0);
    const dF    = parseDate(c.dateFin) || parseDate(c.dateDebut);
    const passe = dF < auj;
    const conf  = CONFIG.TYPES[c.type] || CONFIG.TYPES["default"];

    const icon = L.divIcon({
      className: "",
      html: makeMarkerSvg(passe),
      iconSize: [28, 32], iconAnchor: [14, 32], popupAnchor: [0, -34]
    });

    const dates = c.dateFin && c.dateFin !== c.dateDebut
      ? `${formatDate(c.dateDebut)} → ${formatDate(c.dateFin)}`
      : formatDate(c.dateDebut);

    const lieu = [c.adresse, c.ville, c.dept, c.region, c.pays].filter(Boolean).join(", ");

    const liensHtml = c.liens
      ? c.liens.split(/[|;,\n]+/).map(l => {
          l = l.trim(); if (!l) return "";
          const label = l.includes("billet") ? "🎟 Billetterie"
                      : l.includes("facebook") ? "📘 Facebook"
                      : "🔗 Lien";
          return `<a href="${l}" target="_blank" rel="noopener">${label}</a>`;
        }).join("") : "";

    const popup = `
      <div class="popup-inner ${passe ? 'popup-passe' : ''}">
        <div class="p-header">
          <div>
            <div class="p-nom">${c.nom}</div>
            <div class="p-dates">${dates}</div>
          </div>
        </div>
        ${c.type ? `<span class="p-type-badge" style="background:${passe ? '#eee' : conf.bg};color:${passe ? '#aaa' : conf.color}">${c.type}</span>` : ""}
        <div class="p-adresse">${lieu}</div>
        ${liensHtml ? `<div class="p-liens">${liensHtml}</div>` : ""}
      </div>`;

    L.marker([c.lat, c.lng], { icon })
      .bindPopup(popup, { maxWidth: 300 })
      .addTo(markersLayer);
  });
}

// ── Utils dates ──
function parseDate(str) {
  if (!str) return null;
  const m = str.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (m) return new Date(`${m[3]}-${m[2]}-${m[1]}`);
  const d = new Date(str);
  return isNaN(d) ? null : d;
}
function formatDate(str) {
  const d = parseDate(str);
  if (!d) return str;
  return d.toLocaleDateString("fr-FR", { day:"numeric", month:"long", year:"numeric" });
}

// ── Events ──
document.getElementById("f-region").addEventListener("change", () => { majDepts(); appliquerFiltres(); });
["f-debut","f-fin","f-pays","f-dept"].forEach(id =>
  document.getElementById(id).addEventListener("change", appliquerFiltres)
);
document.getElementById("btn-passes").addEventListener("click", () => {
  afficherPasses = !afficherPasses;
  const btn = document.getElementById("btn-passes");
  btn.classList.toggle("actif", afficherPasses);
  btn.textContent = afficherPasses ? "Masquer les concerts passés" : "Afficher les concerts passés";
  appliquerFiltres();
});

chargerDonnees();
</script>
</body>
</html>
